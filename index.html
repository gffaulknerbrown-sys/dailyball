<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8" />
  <title>DailyBall</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <h1>DailyBall</h1>

    <section class="guess-input">
      <input
        type="text"
        id="guess-input"
        placeholder="Type a player name..."
        autocomplete="off"
      />
      <button id="guess-button">Guess</button>
    </section>

    <div id="suggestions" class="suggestions"></div>

    <section class="guesses">
      <div id="guesses-container"></div>
    </section>

    <!-- Player profile section -->
    <section id="player-profile" class="player-profile"></section>
  </main>

  <!-- Load data FIRST -->
  <script src="players.js"></script>
  <script src="leagueMap.js"></script>
  <script src="continentMap.js"></script>

  <!-- Load game logic LAST -->
  <script src="script.js"></script>
</body>
</html>
